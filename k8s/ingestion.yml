apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: airchive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      containers:
        - name: ingestion
          image: airchive/ingestion:latest
          envFrom:
            - configMapRef:
                name: airchive-config
            - secretRef:
                name: airchive-secrets
          env:
            - name: REDIS_HOST
              value: redis
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
