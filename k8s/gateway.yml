apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: airchive
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: airchive/gateway:latest
          ports:
            - containerPort: 4000
              name: http
            - containerPort: 4001
              name: ws
          envFrom:
            - configMapRef:
                name: airchive-config
            - secretRef:
                name: airchive-secrets
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: REDIS_HOST
              value: redis
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/system/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/system/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: airchive
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 4000
      targetPort: 4000
    - name: ws
      port: 4001
      targetPort: 4001
