apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-engine
  namespace: airchive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-engine
  template:
    metadata:
      labels:
        app: alert-engine
    spec:
      containers:
        - name: alert-engine
          image: airchive/alert-engine:latest
          envFrom:
            - configMapRef:
                name: airchive-config
            - secretRef:
                name: airchive-secrets
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: REDIS_HOST
              value: redis
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
